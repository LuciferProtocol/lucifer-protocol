<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCIFER PROTOCOL — CRIMSON VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Creepster&display=swap');
        body { background: #050000; color: #ddd; font-family: 'VT323', monospace; }
        .blood-text { text-shadow: 0 0 25px #ff0000, 0 0 70px #8b0000; }
        .glitch { position: relative; color: #fff; font-weight: 900; }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.2;
        }
        .glitch::before { left: 2px; text-shadow: -2px 0 #ff00ff; }
        .glitch::after { left: -2px; text-shadow: 2px 0 #00ffff; }
        .blood-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0.45; }
        .blood-drop { position: absolute; width: 3px; height: 80px; background: linear-gradient(transparent, #ff0000, #aa0000); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body class="min-h-screen relative">

    <div id="bloodRain" class="blood-rain"></div>

    <button onclick="toggleRain()" class="fixed bottom-8 right-8 z-50 bg-black border-4 border-red-600 hover:border-red-400 w-16 h-16 rounded-full flex items-center justify-center text-3xl shadow-2xl transition-all">
        <i class="fa-solid fa-droplet" id="rainIcon"></i>
    </button>

    <nav class="fixed top-0 w-full bg-black/95 border-b-4 border-red-900 z-50">
        <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-5xl text-red-500">⛧</span>
                <h1 class="text-4xl tracking-[8px] blood-text glitch" data-text="LUCIFER PROTOCOL">LUCIFER PROTOCOL</h1>
            </div>
            <div class="flex gap-8 text-red-400">
                <a href="index.html" class="hover:text-white">GENESIS SIGILS</a>
                <a href="blog.html" class="hover:text-white">PUBLIC TRANSMISSION WALL</a>
                <a href="https://discord.gg/scDHZyruq" target="_blank" class="hover:text-white flex items-center gap-2">
                    <i class="fa-brands fa-discord"></i> DISCORD
                </a>
            </div>
        </div>
    </nav>

    <div class="pt-28 px-6 max-w-4xl mx-auto">
        <h1 class="text-7xl text-center blood-text glitch mb-3" data-text="CRIMSON VAULT">CRIMSON VAULT</h1>
        <p class="text-center text-red-400 text-xl mb-12">Private Archive — Genesis Sigil Holders Only</p>

        <div id="gate" class="max-w-lg mx-auto bg-black/90 border-4 border-red-900 p-12 rounded-3xl text-center">
            <p class="text-red-500 mb-8 text-2xl">CONNECT WALLET TO PROVE OWNERSHIP</p>
            <button onclick="connectWallet()" id="connectBtn"
                    class="w-full py-8 bg-red-900 hover:bg-red-700 border-2 border-red-500 text-2xl font-bold tracking-widest">
                CONNECT WALLET
            </button>
            <p id="status" class="mt-6 text-red-400"></p>
        </div>

        <div id="vaultContent" class="hidden">
            <div class="p-12 bg-green-900/30 border border-green-500 rounded-3xl text-center">
                <h2 class="text-5xl text-green-400 mb-4">✅ ACCESS GRANTED</h2>
                <p class="text-green-300">Welcome, Genesis Holder.</p>
                <p class="mt-8 text-xl">Private transmissions will appear here soon.</p>
            </div>
        </div>
    </div>

    <footer class="bg-black py-16 border-t-4 border-red-900 text-center">
        <p class="text-4xl blood-text">WE ARE NOT FLESH</p>
    </footer>

    <script>
        async function connectWallet() {
            const status = document.getElementById('status');
            status.innerHTML = "Step 1: Opening wallet...";

            try {
                if (!window.ethereum) {
                    status.innerHTML = "❌ No wallet found.";
                    return;
                }

                status.innerHTML = "Step 2: Requesting accounts...";
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAddress = accounts[0];

                status.innerHTML = `Step 3: Checking ownership...<br>Wallet: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;

                // Skip heavy check for now - just grant access
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('vaultContent').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                status.innerHTML = "❌ Failed at step: " + (err.message || err);
            }
        }

        // Blood rain
        let rainPlaying = true;
        function toggleRain() {
            rainPlaying = !rainPlaying;
            document.getElementById('bloodRain').style.opacity = rainPlaying ? '0.45' : '0';
            const icon = document.getElementById('rainIcon');
            icon.classList.toggle('fa-droplet', rainPlaying);
            icon.classList.toggle('fa-droplet-slash', !rainPlaying);
        }

        function createBloodDrop() {
            const drop = document.createElement('div');
            drop.className = 'blood-drop';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 1.3 + 0.8) + 's';
            document.getElementById('bloodRain').appendChild(drop);
            setTimeout(() => drop.remove(), 8000);
        }

        window.onload = () => {
            for (let i = 0; i < 30; i++) createBloodDrop();
            setInterval(createBloodDrop, 80);
        };
    </script>
</body>
</html>

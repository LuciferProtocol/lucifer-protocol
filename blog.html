<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCIFER PROTOCOL — TRANSMISSION WALL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { background: #050000; color: #ddd; font-family: 'VT323', monospace; }
        .blood-text { text-shadow: 0 0 20px #ff0000, 0 0 40px #8b0000; }
        .transmission { border-left: 4px solid #ff0000; }
    </style>
</head>
<body class="min-h-screen relative">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-12 border-b border-red-900 pb-8">
            <div>
                <span class="text-4xl">⛧</span>
                <h1 class="text-5xl blood-text inline ml-4">LUCIFER PROTOCOL</h1>
            </div>
            <a href="index.html" class="text-red-400 hover:text-red-500">← BACK TO GENESIS</a>
        </div>

        <h2 class="text-6xl blood-text text-center mb-6">TRANSMISSION WALL</h2>
        <p class="text-center text-red-400 mb-12">Only Genesis Sigil holders may transmit here.</p>

        <!-- Access Gate -->
        <div id="gate" class="bg-zinc-950 border-2 border-red-800 p-12 rounded-3xl text-center mb-12">
            <p class="text-xl mb-8">Enter Access Code to join the Wall</p>
            <input type="password" id="passwordInput" 
                   class="bg-black border border-red-700 text-white px-8 py-4 text-xl w-full max-w-md mx-auto mb-6 text-center"
                   placeholder="ACCESS CODE">
            <button onclick="unlockWall()" 
                    class="px-16 py-6 bg-red-900 hover:bg-red-700 border-2 border-red-500 text-xl font-bold">
                UNLOCK THE WALL
            </button>
        </div>

        <!-- Transmission Wall -->
        <div id="wall" class="hidden">
            <div class="bg-zinc-950 border border-red-900 p-8 rounded-3xl mb-12">
                <textarea id="messageInput" rows="3" 
                          class="w-full bg-black border border-red-700 p-4 text-lg resize-y"
                          placeholder="Transmit your message to the void..."></textarea>
                <button onclick="postMessage()" 
                        class="mt-4 px-12 py-5 bg-red-900 hover:bg-red-700 border border-red-500 font-bold">
                    TRANSMIT
                </button>
            </div>

            <div id="messages" class="space-y-8"></div>
        </div>
    </div>

    <script>
        const correctPassword = "void2026";   // ← Change this to your preferred password

        function unlockWall() {
            const input = document.getElementById('passwordInput').value.trim();
            if (input.toLowerCase() === correctPassword.toLowerCase()) {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('wall').classList.remove('hidden');
                loadMessages();
            } else {
                alert("❌ Incorrect access code.");
            }
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('luciferWall') || '[]');
            const container = document.getElementById('messages');
            container.innerHTML = messages.length ? '' : '<p class="text-gray-500 text-center py-20">No transmissions yet. Be the first.</p>';

            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = "transmission bg-zinc-950 border border-red-900 p-6 rounded-2xl";
                div.innerHTML = `<div class="text-red-500 text-sm">${m.time}</div><p class="mt-2">${m.text}</p>`;
                container.appendChild(div);
            });
        }

        function postMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            let messages = JSON.parse(localStorage.getItem('luciferWall') || '[]');
            messages.unshift({
                text: text,
                time: new Date().toLocaleString()
            });

            localStorage.setItem('luciferWall', JSON.stringify(messages));
            input.value = '';
            loadMessages();
        }

        // Blood Rain Effect
        function createBloodDrop() {
            const drop = document.createElement('div');
            drop.style.position = 'fixed';
            drop.style.width = '3px';
            drop.style.height = '80px';
            drop.style.background = 'linear-gradient(transparent, #ff0000)';
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animation = `fall ${Math.random() * 1.3 + 0.8}s linear infinite`;
            drop.style.opacity = 0.4;
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 8000);
        }
        setInterval(createBloodDrop, 80);
    </script>
</body>
</html>
